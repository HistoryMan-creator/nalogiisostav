    correct: [0, 1, 2], explanation: 'Верно 1, 2, 3. Директор не является субъектом, так как у него отсутствует вина (он был не в курсе). Мотив — это всегда элемент субъективной стороны.'
  },
  {
    id: 40, topic: 'offense', type: 'single',
    text: 'ЗАДАЧА (ТИП 22). 11-летний школьник из хулиганских побуждений испортил краской фасад исторического здания. Полиция отказала в возбуждении дела в отношении мальчика, так как в его действиях нет полного состава правонарушения. Отсутствие какого элемента стало причиной этого?',
    options: ['Объекта', 'Объективной стороны', 'Субъекта', 'Субъективной стороны'],
    correct: 2, explanation: 'Отсутствует субъект правонарушения. Субъектом может быть только деликтоспособное лицо, то есть достигшее определенного возраста (для большинства правонарушений — 16 лет, за некоторые тяжкие — с 14 лет). 11-летний ребенок субъектом не является.'
  }
];

// --- ЛОГИКА ПРИЛОЖЕНИЯ ---
const appState = {
    view: 'menu', 
    currentQuestions: [],
    currentIndex: 0,
    score: 0,
    selectedSingle: null,
    selectedMultiple: [],
    selectedMatching: {}, // itemId -> optId
    isChecked: false,
    isAnimating: true // Флаг для управления анимацией и устранения "мерцания"
};

const App = {
    init() {
        this.render();
    },

    startQuiz(topic) {
        let q = [];
        if (topic === 'tax') q = taxQuestions.filter(q => q.topic === 'tax');
        else if (topic === 'offense') q = taxQuestions.filter(q => q.topic === 'offense');
        else q = [...taxQuestions].sort(() => Math.random() - 0.5); 
        
        appState.currentQuestions = q;
        appState.currentIndex = 0;
        appState.score = 0;
        appState.isAnimating = true;
        this.resetCurrentState();
        appState.view = 'quiz';
        this.render();
    },

    resetCurrentState() {
        appState.selectedSingle = null;
        appState.selectedMultiple = [];
        appState.selectedMatching = {};
        appState.isChecked = false;
    },

    selectSingle(i) {
        if(appState.isChecked) return;
        appState.selectedSingle = i;
        this.render();
    },

    toggleMultiple(i) {
        if(appState.isChecked) return;
        const index = appState.selectedMultiple.indexOf(i);
        if (index > -1) appState.selectedMultiple.splice(index, 1);
        else appState.selectedMultiple.push(i);
        this.render();
    },

    // --- Логика Drag & Drop для сопоставлений ---
    onDragStart(e, optId) {
        if(appState.isChecked) return;
        e.dataTransfer.setData('text/plain', optId);
        e.dataTransfer.effectAllowed = 'move';
    },

    onDragOver(e) {
        if(appState.isChecked) return;
        e.preventDefault();
        e.currentTarget.classList.add('drag-over');
    },

    onDragLeave(e) {
        e.currentTarget.classList.remove('drag-over');
    },

    onDropSlot(e, itemId) {
        e.preventDefault();
        e.currentTarget.classList.remove('drag-over');
        if(appState.isChecked) return;
        
        const optId = e.dataTransfer.getData('text/plain');
        if (optId) {
            // Удаляем опцию из старого слота, если она там была (для 1-к-1 маппинга)
            for (let key in appState.selectedMatching) {
                if (appState.selectedMatching[key] === optId) {
                    delete appState.selectedMatching[key];
                }
            }
            // Ставим в новый слот
            appState.selectedMatching[itemId] = optId;
            this.render();
        }
    },

    onDropBank(e) {
        e.preventDefault();
        e.currentTarget.classList.remove('drag-over');
        if(appState.isChecked) return;
        
        const optId = e.dataTransfer.getData('text/plain');
        if (optId) {
            // Убираем опцию из всех слотов, возвращая в банк
            for (let key in appState.selectedMatching) {
                if (appState.selectedMatching[key] === optId) {
                    delete appState.selectedMatching[key];
                }
            }
            this.render();
        }
    },

    removeMatching(itemId) {
        if(appState.isChecked) return;
        delete appState.selectedMatching[itemId];
        this.render();
    },

    handleCheck() {
        appState.isChecked = true;
        const q = appState.currentQuestions[appState.currentIndex];
        let isCorrect = false;

        if (q.type === 'single') {
            isCorrect = appState.selectedSingle === q.correct;
        } else if (q.type === 'multiple') {
            const sortedSelected = [...appState.selectedMultiple].sort();
            const sortedCorrect = [...q.correct].sort();
            isCorrect = JSON.stringify(sortedSelected) === JSON.stringify(sortedCorrect);
        } else if (q.type === 'matching') {
            const allMatched = Object.keys(q.correct).every(key => appState.selectedMatching[key] === q.correct[key]);
            const noExtra = Object.keys(appState.selectedMatching).length === Object.keys(q.correct).length;
            isCorrect = allMatched && noExtra;
        }

        if (isCorrect) appState.score++;
        this.render();
        
        // Плавный скролл вниз к результату проверки
        setTimeout(() => {
            const feedbackEl = document.getElementById('feedback-box');
            if(feedbackEl) feedbackEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 50);
    },

    handleNext() {
        if (appState.currentIndex < appState.currentQuestions.length - 1) {
            appState.currentIndex++;
            appState.isAnimating = true; // Запускаем анимацию только при смене вопроса
            this.resetCurrentState();
        } else {
            appState.view = 'results';
            appState.isAnimating = true;
        }
        this.render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    goHome() {
        appState.view = 'menu';
        appState.isAnimating = true;
        this.render();
    },

    render() {
        const container = document.getElementById('app');
        
        if (appState.view === 'menu') container.innerHTML = this.renderMenu();
        else if (appState.view === 'quiz') container.innerHTML = this.renderQuiz();
        else if (appState.view === 'results') container.innerHTML = this.renderResults();
        
        // Выключаем анимацию после первого рендера, чтобы избежать мерцания при кликах на ответы
        setTimeout(() => { appState.isAnimating = false; }, 50);
    },

    renderMenu() {
        const taxCount = taxQuestions.filter(q => q.topic === 'tax').length;
        const offenseCount = taxQuestions.filter(q => q.topic === 'offense').length;
        
        return `
        <div class="flex items-center justify-center w-full flex-1 p-4 sm:p-6 ${appState.isAnimating ? 'animate-fade-in-up' : ''}">
            <div class="bg-white/90 backdrop-blur-md rounded-3xl shadow-xl shadow-indigo-100/50 border border-white max-w-2xl w-full p-8 sm:p-12 text-center space-y-8">
                <div class="flex justify-center mb-2">
                    <div class="bg-gradient-to-br from-indigo-100 to-blue-50 p-5 rounded-2xl shadow-sm border border-white">
                        ${icons.BookOpen}
                    </div>
                </div>
                <div>
                    <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-800 tracking-tight mb-4">ЕГЭ: Обществознание</h1>
                    <p class="text-slate-500 text-lg sm:text-xl font-medium max-w-lg mx-auto">
                        Отработка сложных заданий. Выбери тему для тренировки.
                    </p>
                </div>
                
                <div class="flex flex-col gap-4 max-w-md mx-auto pt-4">
                    <button onclick="App.startQuiz('tax')" class="group relative overflow-hidden bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-5 px-6 rounded-2xl transition-all shadow-lg shadow-blue-600/30 hover:shadow-blue-600/40 hover:-translate-y-1 active:scale-[0.98] flex items-center justify-between">
                        <span class="text-lg relative z-10">Структура налога <span class="opacity-75 font-normal text-sm ml-2">(${taxCount} шт)</span></span>
                        <div class="relative z-10 group-hover:translate-x-1 transition-transform">${icons.ChevronRight}</div>
                    </button>
                    
                    <button onclick="App.startQuiz('offense')" class="group relative overflow-hidden bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-5 px-6 rounded-2xl transition-all shadow-lg shadow-emerald-500/30 hover:shadow-emerald-500/40 hover:-translate-y-1 active:scale-[0.98] flex items-center justify-between">
                        <span class="text-lg relative z-10">Состав правонарушения <span class="opacity-75 font-normal text-sm ml-2">(${offenseCount} шт)</span></span>
                        <div class="relative z-10 group-hover:translate-x-1 transition-transform">${icons.ChevronRight}</div>
                    </button>
                    
                    <button onclick="App.startQuiz('all')" class="group relative overflow-hidden bg-white hover:bg-slate-50 text-slate-700 border-2 border-slate-200 hover:border-slate-300 font-bold py-5 px-6 rounded-2xl transition-all shadow-sm active:scale-[0.98] flex items-center justify-between mt-2">
                        <span class="text-lg">Смешанный тест <span class="text-slate-400 font-normal text-sm ml-2">(${taxQuestions.length} шт)</span></span>
                        <div class="text-slate-400 group-hover:translate-x-1 transition-transform">${icons.ChevronRight}</div>
                    </button>
                </div>
            </div>
        </div>`;
    },

    renderResults() {
        const percentage = Math.round((appState.score / appState.currentQuestions.length) * 100);
        let feedback = '';
        let colorClass = 'text-rose-500';
        if (percentage >= 80) { feedback = 'Отличный результат! Ты готов к ЕГЭ по этим темам.'; colorClass = 'text-amber-500'; }
        else if (percentage >= 50) { feedback = 'Хорошо, но есть куда расти. Рекомендуем повторить теорию.'; colorClass = 'text-blue-500'; }
        else { feedback = 'Нужно еще поработать. Внимательно изучи теорию!'; }

        return `
        <div class="flex items-center justify-center w-full flex-1 p-4 ${appState.isAnimating ? 'animate-fade-in-up' : ''}">
            <div class="bg-white/90 backdrop-blur-md rounded-3xl shadow-xl shadow-indigo-100/50 border border-white max-w-md w-full p-8 sm:p-10 text-center space-y-6">
                ${icons.Award(colorClass)}
                <h2 class="text-3xl font-extrabold text-slate-800">Результаты</h2>
                <div class="text-7xl font-black text-slate-800 tracking-tighter">${appState.score} <span class="text-3xl text-slate-400 font-bold">/ ${appState.currentQuestions.length}</span></div>
                <p class="text-lg font-medium text-slate-500 bg-slate-50 p-4 rounded-xl">${feedback}</p>
                
                <div class="pt-6 mt-4 border-t border-slate-100">
                    <button onclick="App.goHome()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 px-6 rounded-2xl transition-all active:scale-[0.98] flex items-center justify-center gap-2 shadow-lg shadow-slate-800/20">
                        ${icons.Home} Главное меню
                    </button>
                </div>
            </div>
        </div>`;
    },

    renderQuiz() {
        const q = appState.currentQuestions[appState.currentIndex];
        const isChecked = appState.isChecked;
        
        let isCheckDisabled = isChecked || 
            (q.type === 'single' && appState.selectedSingle === null) ||
            (q.type === 'multiple' && appState.selectedMultiple.length === 0) ||
            (q.type === 'matching' && Object.keys(appState.selectedMatching).length < q.leftItems.length);

        let isCurrentCorrect = false;
        if (isChecked) {
            if (q.type === 'single') isCurrentCorrect = appState.selectedSingle === q.correct;
            else if (q.type === 'multiple') {
                const sortedSel = [...appState.selectedMultiple].sort();
                const sortedCor = [...q.correct].sort();
                isCurrentCorrect = JSON.stringify(sortedSel) === JSON.stringify(sortedCor);
            } else if (q.type === 'matching') {
                isCurrentCorrect = Object.keys(q.correct).every(key => appState.selectedMatching[key] === q.correct[key]);
            }
        }

        let optionsHtml = '';
        
        // Рендер ОДИНАРНОГО ВЫБОРА
        if (q.type === 'single') {
            optionsHtml = `<div class="space-y-3">` + q.options.map((opt, i) => {
                let btnClass = "w-full text-left p-4 sm:p-5 rounded-2xl border-2 flex items-center gap-4 min-h-[4rem] active:scale-[0.99] ";
                let circleClass = "w-6 h-6 rounded-full border-2 flex-shrink-0 transition-colors ";
                
                if (!isChecked) {
                    btnClass += appState.selectedSingle === i ? "border-indigo-500 bg-indigo-50/50 shadow-sm" : "border-slate-200 hover:border-indigo-300 hover:bg-slate-50 cursor-pointer bg-white";
                    circleClass += appState.selectedSingle === i ? "border-indigo-500 bg-indigo-500" : "border-slate-300";
                } else {
                    btnClass += "cursor-default pointer-events-none ";
                    if (i === q.correct) { btnClass += "border-emerald-500 bg-emerald-50 shadow-sm"; circleClass += "border-emerald-500 bg-emerald-500"; }
                    else if (appState.selectedSingle === i) { btnClass += "border-rose-400 bg-rose-50"; circleClass += "border-rose-400 bg-rose-400"; }
                    else { btnClass += "border-slate-100 opacity-40 bg-white"; circleClass += "border-slate-200"; }
                }

                return `<button onclick="App.selectSingle(${i})" class="${btnClass}">
                            <div class="${circleClass}"></div>
                            <span class="text-base sm:text-lg font-medium text-slate-700">${opt}</span>
                        </button>`;
            }).join('') + `</div>`;
        } 
        // Рендер МНОЖЕСТВЕННОГО ВЫБОРА
        else if (q.type === 'multiple') {
            optionsHtml = `<div class="space-y-3">` + q.options.map((opt, i) => {
                const isSelected = appState.selectedMultiple.includes(i);
                const isActuallyCorrect = q.correct.includes(i);
                
                let btnClass = "w-full text-left p-4 sm:p-5 rounded-2xl border-2 flex items-start gap-4 min-h-[4rem] active:scale-[0.99] ";
                let boxClass = "w-7 h-7 mt-0.5 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition-colors ";
                
                if (!isChecked) {
                    btnClass += isSelected ? "border-indigo-500 bg-indigo-50/50 shadow-sm" : "border-slate-200 hover:border-indigo-300 hover:bg-slate-50 cursor-pointer bg-white";
                    boxClass += isSelected ? "border-indigo-500 bg-indigo-500" : "border-slate-300";
                } else {
                    btnClass += "cursor-default pointer-events-none ";
                    if (isActuallyCorrect) { btnClass += "border-emerald-500 bg-emerald-50 shadow-sm"; boxClass += "border-emerald-500 bg-emerald-500"; }
                    else if (isSelected && !isActuallyCorrect) { btnClass += "border-rose-400 bg-rose-50"; boxClass += "border-rose-400 bg-rose-400"; }
                    else { btnClass += "border-slate-100 opacity-40 bg-white"; boxClass += "border-slate-200"; }
                }

                const checkIcon = isSelected || (isChecked && isActuallyCorrect) 
                    ? `<svg class="w-5 h-5 text-white drop-shadow-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>` 
                    : '';

                return `<button onclick="App.toggleMultiple(${i})" class="${btnClass}">
                            <div class="${boxClass}">${checkIcon}</div>
                            <span class="text-base sm:text-lg font-medium text-slate-700 leading-snug">${opt}</span>
                        </button>`;
            }).join('') + `</div>`;
        }
        // Рендер DRAG & DROP (Сопоставление)
        else if (q.type === 'matching') {
            
            // Банк доступных опций
            const availableOptions = q.rightOptions.filter(opt => !Object.values(appState.selectedMatching).includes(opt.id));
            
            let bankHtml = `
            <div class="bg-indigo-50/50 p-4 sm:p-5 rounded-2xl border-2 border-indigo-100 border-dashed min-h-[120px] transition-colors"
                 ondragover="App.onDragOver(event)" ondragleave="App.onDragLeave(event)" ondrop="App.onDropBank(event)">
                 <h4 class="font-bold mb-3 text-indigo-900 text-sm uppercase tracking-wider flex items-center gap-2">
                     <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                     Банк понятий (перетащите отсюда)
                 </h4>
                 <div class="flex flex-wrap gap-2">
                     ${availableOptions.map(opt => `
                         <div draggable="${!isChecked}" ondragstart="App.onDragStart(event, '${opt.id}')"
                              class="bg-white border-2 border-indigo-200 text-indigo-900 font-bold px-4 py-3 rounded-xl shadow-sm ${!isChecked ? 'cursor-grab active:cursor-grabbing hover:border-indigo-400 hover:shadow-md hover:-translate-y-0.5' : ''} transition-all touch-none select-none text-sm sm:text-base">
                             ${opt.id}) ${opt.text.replace(/^[0-9]\)\s*/, '')}
                         </div>
                     `).join('')}
                     ${availableOptions.length === 0 ? '<div class="text-indigo-300 text-sm font-semibold italic w-full text-center py-4">Все элементы распределены</div>' : ''}
                 </div>
            </div>`;

            // Слоты слева
            let slotsHtml = q.leftItems.map(item => {
                const selOptId = appState.selectedMatching[item.id];
                const selOpt = q.rightOptions.find(o => o.id === selOptId);
                const isCorrectMatch = selOptId === q.correct[item.id];

                let dropZoneClass = "flex-1 min-h-[3.5rem] border-2 border-dashed rounded-xl p-2 flex items-center justify-center transition-all ";
                if (!isChecked) {
                    dropZoneClass += selOpt ? "border-indigo-300 bg-indigo-50/30" : "border-slate-300 bg-slate-50";
                } else {
                    dropZoneClass += isCorrectMatch ? "border-emerald-400 bg-emerald-50" : "border-rose-400 bg-rose-50";
                }

                // Убираем префикс А) Б) у фактов для красоты (если есть)
                let itemTextClean = item.text.replace(/^[А-Я]\)\s*/, '');

                return `
                <div class="flex flex-col md:flex-row gap-3 items-stretch w-full">
                    <div class="md:w-1/2 bg-white p-3 sm:p-4 rounded-xl border border-slate-200 shadow-sm flex items-center">
                        <span class="font-black text-lg text-slate-500 bg-slate-100 w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 mr-3">${item.id}</span>
                        <span class="text-sm sm:text-base text-slate-700 font-medium leading-tight">${itemTextClean}</span>
                    </div>
                    
                    <div class="md:w-1/2 ${dropZoneClass}" ondragover="App.onDragOver(event)" ondragleave="App.onDragLeave(event)" ondrop="App.onDropSlot(event, '${item.id}')">
                        ${selOpt ? `
                            <div draggable="${!isChecked}" ondragstart="App.onDragStart(event, '${selOpt.id}')" ${!isChecked ? `onclick="App.removeMatching('${item.id}')"` : ''}
                                 class="w-full h-full bg-white border-2 border-indigo-400 text-indigo-900 font-bold px-3 py-2 rounded-lg shadow-sm ${!isChecked ? 'cursor-grab active:cursor-grabbing hover:bg-rose-50 hover:border-rose-400 hover:text-rose-700 hover:shadow-md' : ''} transition-all flex items-center justify-center text-center select-none text-sm sm:text-base group">
                                <span class="group-hover:hidden transition-all">${selOpt.id}) ${selOpt.text.replace(/^[0-9]\)\s*/, '')}</span>
                                <span class="hidden group-hover:block transition-all text-rose-600">Отменить (клик)</span>
                            </div>
                        ` : `<span class="text-slate-400 text-sm font-semibold flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                                Бросьте сюда
                             </span>`}
                    </div>
                    ${(isChecked && !isCorrectMatch) ? `<div class="md:w-auto flex items-center justify-center text-sm text-rose-600 font-bold bg-rose-100/50 px-4 py-2 rounded-xl whitespace-nowrap">Верно: ${q.correct[item.id]}</div>` : ''}
                </div>
                `;
            }).join('');

            optionsHtml = `
            <div class="space-y-6">
                ${bankHtml}
                <div class="space-y-3 pt-2">
                    <h4 class="font-bold text-slate-800 px-1 text-sm uppercase tracking-wider">Сопоставьте:</h4>
                    ${slotsHtml}
                </div>
            </div>`;
        }

        // --- Feedback ---
        let feedbackHtml = '';
        if (isChecked) {
            feedbackHtml = `
            <div id="feedback-box" class="p-5 sm:p-8 rounded-3xl mb-8 flex flex-col sm:flex-row items-start gap-5 border shadow-sm animate-fade-in-up ${isCurrentCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}">
                <div class="flex-shrink-0 bg-white p-2 rounded-full shadow-sm">${isCurrentCorrect ? icons.CheckCircle : icons.XCircle}</div>
                <div>
                    <h3 class="text-xl font-extrabold mb-2 ${isCurrentCorrect ? 'text-emerald-800' : 'text-rose-800'}">
                        ${isCurrentCorrect ? 'Абсолютно верно!' : 'Ошибка в ответе'}
                    </h3>
                    <p class="text-slate-700 text-base sm:text-lg leading-relaxed font-medium">${q.explanation}</p>
                </div>
            </div>`;
        }

        // --- Buttons ---
        let controlsHtml = '';
        if (!isChecked) {
            controlsHtml = `
                <button onclick="App.handleNext()" class="px-5 py-4 rounded-2xl font-bold text-base text-slate-400 hover:text-slate-600 hover:bg-slate-200/50 active:scale-[0.98] flex items-center gap-1">
                    Пропустить ${icons.ChevronRight}
                </button>
                <button onclick="App.handleCheck()" ${isCheckDisabled ? 'disabled' : ''} class="px-6 sm:px-10 py-4 sm:py-5 rounded-2xl font-bold text-base sm:text-lg transition-all active:scale-[0.98] ${isCheckDisabled ? 'bg-slate-200 text-slate-400 cursor-not-allowed pointer-events-none' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 hover:shadow-indigo-600/40'}">
                    Проверить ответ
                </button>
            `;
        } else {
            controlsHtml = `
                <div class="flex justify-end w-full">
                    <button onclick="App.handleNext()" class="w-full sm:w-auto px-8 sm:px-12 py-5 rounded-2xl font-bold text-lg bg-slate-800 text-white hover:bg-slate-700 active:scale-[0.98] shadow-lg shadow-slate-800/20 flex items-center justify-center gap-2">
                        ${appState.currentIndex < appState.currentQuestions.length - 1 ? 'Следующее задание' : 'Завершить тест'} ${icons.ChevronRight}
                    </button>
                </div>
            `;
        }

        const progressPercent = ((appState.currentIndex + 1) / appState.currentQuestions.length) * 100;

        return `
        <div class="w-full max-w-4xl p-4 sm:p-6 lg:p-8 flex-1 flex flex-col ${appState.isAnimating ? 'animate-fade-in-up' : ''}">
            
            <!-- Header / Progress -->
            <div class="flex flex-col-reverse sm:flex-row sm:justify-between sm:items-end gap-3 mb-6">
                <div class="text-sm font-bold text-slate-400 tracking-widest uppercase bg-white px-4 py-2 rounded-xl inline-block shadow-sm border border-slate-100 self-start">
                    ${q.topic === 'tax' ? '💰 Структура налога' : '⚖️ Правонарушение'}
                </div>
                <div class="text-sm font-extrabold bg-indigo-100/80 text-indigo-800 px-4 py-2 rounded-xl self-end sm:self-auto">
                    Задание ${appState.currentIndex + 1} из ${appState.currentQuestions.length}
                </div>
            </div>
            
            <div class="w-full bg-slate-200/80 rounded-full h-2.5 mb-8 shadow-inner overflow-hidden">
                <div class="bg-gradient-to-r from-indigo-500 to-blue-500 h-full rounded-full transition-all duration-500 ease-out" style="width: ${progressPercent}%"></div>
            </div>

            <!-- Question Card -->
            <div class="bg-white/95 backdrop-blur-sm rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-6 sm:p-10 mb-8">
                <h2 class="text-xl sm:text-2xl font-bold text-slate-800 mb-8 leading-snug">
                    ${q.text}
                </h2>
                ${optionsHtml}
            </div>

            ${feedbackHtml}

            <!-- Controls -->
            <div class="flex justify-between items-center w-full mt-auto pt-4 pb-8">
                ${controlsHtml}
            </div>
            
            <div class="mt-4 pb-8 text-center">
                <button onclick="App.goHome()" class="text-slate-400 hover:text-slate-600 text-sm font-bold tracking-wide transition-colors uppercase">
                    Выйти в главное меню
                </button>
            </div>

        </div>`;
    }
};

// Запуск приложения
document.addEventListener('DOMContentLoaded', () => {
    App.init();
});
</script>
</body>
</html>
