    text: 'ЗАДАЧА 22. Бухгалтер умышленно занизила налоги (корысть). Директор не в курсе. Верно:',
    options: [ '1. Объект — финансовые интересы государства.', '2. Субъективная сторона — прямой умысел.', '3. Объективная сторона — занижение базы в документах.', '4. Директор является соучастником (субъектом).', '5. Корыстный мотив — объективная сторона.' ],
    correct: [0, 1, 2], 
    explanation: '💡 <b>Юридический разбор:</b><br>❌ Директор не является субъектом преступления, так как он не знал о действиях бухгалтера (у него отсутствует вина).<br>❌ Корыстный мотив — это всегда элемент субъективной (внутренней) стороны.'
  },
  {
    id: 40, topic: 'offense', type: 'single',
    text: 'ЗАДАЧА 22. 11-летний школьник разрисовал фасад здания. В деле отказано из-за отсутствия полного состава. Чего не хватает?',
    options: ['Объекта', 'Объективной стороны', 'Субъекта', 'Субъективной стороны'],
    correct: 2, 
    explanation: '📌 <b>Важное правило:</b><br>Чтобы состав правонарушения был полным, лицо должно обладать <b>деликтоспособностью</b> (достичь возраста ответственности). По закону (КоАП и УК РФ) 11-летний ребенок не несет ответственности, следовательно, в деле <b>отсутствует субъект правонарушения</b>.'
  }
];

// --- ЛОГИКА ПРИЛОЖЕНИЯ ---
const appState = {
    view: 'menu', 
    currentQuestions: [],
    currentIndex: 0,
    score: 0,
    selectedSingle: null,
    selectedMultiple: [],
    selectedMatching: {}, 
    selectedBankItem: null,
    isChecked: false,
    isAnimating: true 
};

const App = {
    init() { this.render(); },
    startQuiz(topic) {
        let q = [];
        if (topic === 'tax') q = taxQuestions.filter(q => q.topic === 'tax');
        else if (topic === 'offense') q = taxQuestions.filter(q => q.topic === 'offense');
        else q = [...taxQuestions].sort(() => Math.random() - 0.5); 
        appState.currentQuestions = q;
        appState.currentIndex = 0;
        appState.score = 0;
        appState.isAnimating = true;
        this.resetCurrentState();
        appState.view = 'quiz';
        this.render();
    },
    resetCurrentState() {
        appState.selectedSingle = null;
        appState.selectedMultiple = [];
        appState.selectedMatching = {};
        appState.selectedBankItem = null;
        appState.isChecked = false;
    },
    selectSingle(i) { if(appState.isChecked) return; appState.selectedSingle = i; this.render(); },
    toggleMultiple(i) {
        if(appState.isChecked) return;
        const index = appState.selectedMultiple.indexOf(i);
        if (index > -1) appState.selectedMultiple.splice(index, 1);
        else appState.selectedMultiple.push(i);
        this.render();
    },
    selectBankItem(optId) {
        if(appState.isChecked) return;
        appState.selectedBankItem = (appState.selectedBankItem === optId) ? null : optId;
        this.render();
    },
    clickSlot(itemId) {
        if(appState.isChecked) return;
        if (appState.selectedBankItem) {
            for (let key in appState.selectedMatching) {
                if (appState.selectedMatching[key] === appState.selectedBankItem) delete appState.selectedMatching[key];
            }
            appState.selectedMatching[itemId] = appState.selectedBankItem;
            appState.selectedBankItem = null; 
        } else if (appState.selectedMatching[itemId]) {
            delete appState.selectedMatching[itemId];
        }
        this.render();
    },
    handleCheck() {
        appState.isChecked = true;
        appState.selectedBankItem = null;
        const q = appState.currentQuestions[appState.currentIndex];
        let isCorrect = false;

        if (q.type === 'single') isCorrect = appState.selectedSingle === q.correct;
        else if (q.type === 'multiple') {
            const sortedSelected = [...appState.selectedMultiple].sort();
            const sortedCorrect = [...q.correct].sort();
            isCorrect = JSON.stringify(sortedSelected) === JSON.stringify(sortedCorrect);
        } else if (q.type === 'matching') {
            const allMatched = Object.keys(q.correct).every(key => appState.selectedMatching[key] === q.correct[key]);
            const noExtra = Object.keys(appState.selectedMatching).length === Object.keys(q.correct).length;
            isCorrect = allMatched && noExtra;
        }
        if (isCorrect) appState.score++;
        this.render();
        setTimeout(() => {
            const feedbackEl = document.getElementById('feedback-box');
            if(feedbackEl) feedbackEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 50);
    },
    handleNext() {
        if (appState.currentIndex < appState.currentQuestions.length - 1) {
            appState.currentIndex++;
            appState.isAnimating = true; 
            this.resetCurrentState();
        } else {
            appState.view = 'results';
            appState.isAnimating = true;
        }
        this.render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    },
    goHome() {
        appState.view = 'menu';
        appState.isAnimating = true;
        this.render();
    },
    render() {
        const container = document.getElementById('app');
        if (appState.view === 'menu') container.innerHTML = this.renderMenu();
        else if (appState.view === 'quiz') container.innerHTML = this.renderQuiz();
        else if (appState.view === 'results') container.innerHTML = this.renderResults();
        setTimeout(() => { appState.isAnimating = false; }, 50);
    },
    renderMenu() {
        const taxCount = taxQuestions.filter(q => q.topic === 'tax').length;
        const offenseCount = taxQuestions.filter(q => q.topic === 'offense').length;
        return `
        <div class="flex items-center justify-center w-full flex-1 p-3 sm:p-6 ${appState.isAnimating ? 'animate-fade-in-up' : ''}">
            <div class="bg-white/90 backdrop-blur-md rounded-[1.5rem] shadow-xl shadow-indigo-100 border border-white w-full p-6 sm:p-10 text-center space-y-6">
                <div class="flex justify-center mb-1">
                    <div class="bg-gradient-to-br from-indigo-100 to-blue-50 p-4 rounded-2xl shadow-sm border border-white">
                        ${icons.BookOpen}
                    </div>
                </div>
                <div>
                    <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-800 tracking-tight mb-2">ЕГЭ: Обществознание</h1>
                    <p class="text-slate-500 text-sm sm:text-base font-medium">Выбери тему для тренировки.</p>
                </div>
                <div class="flex flex-col gap-3 pt-2">
                    <button onclick="App.startQuiz('tax')" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 px-5 rounded-2xl shadow-md active:scale-95 flex items-center justify-between w-full">
                        <span class="text-base sm:text-lg">Структура налога <span class="opacity-75 font-normal text-xs ml-1">(${taxCount} шт)</span></span>
                        ${icons.ChevronRight}
                    </button>
                    <button onclick="App.startQuiz('offense')" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold py-4 px-5 rounded-2xl shadow-md active:scale-95 flex items-center justify-between w-full">
                        <span class="text-base sm:text-lg">Правонарушение <span class="opacity-75 font-normal text-xs ml-1">(${offenseCount} шт)</span></span>
                        ${icons.ChevronRight}
                    </button>
                    <button onclick="App.startQuiz('all')" class="bg-white text-slate-700 border-2 border-slate-200 font-bold py-4 px-5 rounded-2xl shadow-sm active:scale-95 flex items-center justify-between w-full mt-2">
                        <span class="text-base sm:text-lg">Смешанный тест <span class="text-slate-400 font-normal text-xs ml-1">(${taxQuestions.length} шт)</span></span>
                        <div class="text-slate-400">${icons.ChevronRight}</div>
                    </button>
                </div>
            </div>
        </div>`;
    },
    renderResults() {
        const percentage = Math.round((appState.score / appState.currentQuestions.length) * 100);
        let feedback = ''; let colorClass = 'text-rose-500';
        if (percentage >= 80) { feedback = 'Отличный результат! Готов к ЕГЭ.'; colorClass = 'text-amber-500'; }
        else if (percentage >= 50) { feedback = 'Хорошо, но стоит повторить теорию.'; colorClass = 'text-blue-500'; }
        else { feedback = 'Нужно еще поработать. Изучи теорию!'; }
        return `
        <div class="flex items-center justify-center w-full flex-1 p-4 ${appState.isAnimating ? 'animate-fade-in-up' : ''}">
            <div class="bg-white/90 backdrop-blur-md rounded-[1.5rem] shadow-xl border border-white w-full max-w-sm p-8 text-center space-y-6">
                ${icons.Award(colorClass)}
                <h2 class="text-2xl font-extrabold text-slate-800">Результаты</h2>
                <div class="text-6xl font-black text-slate-800 tracking-tighter">${appState.score}<span class="text-2xl text-slate-400 font-bold">/${appState.currentQuestions.length}</span></div>
                <p class="text-sm sm:text-base font-medium text-slate-500 bg-slate-50 p-3 rounded-xl">${feedback}</p>
                <div class="pt-4 mt-2">
                    <button onclick="App.goHome()" class="w-full bg-slate-800 text-white font-bold py-3 sm:py-4 px-6 rounded-xl active:scale-95 flex items-center justify-center gap-2 shadow-md">
                        ${icons.Home} В меню
                    </button>
                </div>
            </div>
        </div>`;
    },
    renderQuiz() {
        const q = appState.currentQuestions[appState.currentIndex];
        const isChecked = appState.isChecked;
        let isCheckDisabled = isChecked || 
            (q.type === 'single' && appState.selectedSingle === null) ||
            (q.type === 'multiple' && appState.selectedMultiple.length === 0) ||
            (q.type === 'matching' && Object.keys(appState.selectedMatching).length < q.leftItems.length);

        let isCurrentCorrect = false;
        if (isChecked) {
            if (q.type === 'single') isCurrentCorrect = appState.selectedSingle === q.correct;
            else if (q.type === 'multiple') {
                const sortedSel = [...appState.selectedMultiple].sort();
                const sortedCor = [...q.correct].sort();
                isCurrentCorrect = JSON.stringify(sortedSel) === JSON.stringify(sortedCor);
            } else if (q.type === 'matching') {
                isCurrentCorrect = Object.keys(q.correct).every(key => appState.selectedMatching[key] === q.correct[key]);
            }
        }

        let optionsHtml = '';
        if (q.type === 'single') {
            optionsHtml = `<div class="space-y-2">` + q.options.map((opt, i) => {
                let btnClass = "w-full text-left px-3 py-3 sm:py-4 rounded-xl border-2 flex items-center gap-3 active:scale-[0.98] ";
                let circleClass = "w-5 h-5 rounded-full border-2 flex-shrink-0 transition-colors ";
                if (!isChecked) {
                    btnClass += appState.selectedSingle === i ? "border-indigo-500 bg-indigo-50" : "border-slate-200 bg-white hover:bg-slate-50";
                    circleClass += appState.selectedSingle === i ? "border-indigo-500 bg-indigo-500" : "border-slate-300";
                } else {
                    btnClass += "pointer-events-none ";
                    if (i === q.correct) { btnClass += "border-emerald-500 bg-emerald-50"; circleClass += "border-emerald-500 bg-emerald-500"; }
                    else if (appState.selectedSingle === i) { btnClass += "border-rose-400 bg-rose-50"; circleClass += "border-rose-400 bg-rose-400"; }
                    else { btnClass += "border-slate-100 opacity-50 bg-white"; circleClass += "border-slate-200"; }
                }
                return `<button onclick="App.selectSingle(${i})" class="${btnClass}"><div class="${circleClass}"></div><span class="text-sm sm:text-base font-semibold text-slate-700 leading-tight">${opt}</span></button>`;
            }).join('') + `</div>`;
        } 
        else if (q.type === 'multiple') {
            optionsHtml = `<div class="space-y-2">` + q.options.map((opt, i) => {
                const isSelected = appState.selectedMultiple.includes(i);
                const isActuallyCorrect = q.correct.includes(i);
                let btnClass = "w-full text-left px-3 py-3 sm:py-4 rounded-xl border-2 flex items-start gap-3 active:scale-[0.98] ";
                let boxClass = "w-6 h-6 mt-0.5 rounded-md border-2 flex items-center justify-center flex-shrink-0 transition-colors ";
                if (!isChecked) {
                    btnClass += isSelected ? "border-indigo-500 bg-indigo-50" : "border-slate-200 bg-white hover:bg-slate-50";
                    boxClass += isSelected ? "border-indigo-500 bg-indigo-500" : "border-slate-300";
                } else {
                    btnClass += "pointer-events-none ";
                    if (isActuallyCorrect) { btnClass += "border-emerald-500 bg-emerald-50"; boxClass += "border-emerald-500 bg-emerald-500"; }
                    else if (isSelected && !isActuallyCorrect) { btnClass += "border-rose-400 bg-rose-50"; boxClass += "border-rose-400 bg-rose-400"; }
                    else { btnClass += "border-slate-100 opacity-50 bg-white"; boxClass += "border-slate-200"; }
                }
                const checkIcon = isSelected || (isChecked && isActuallyCorrect) ? `<svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>` : '';
                return `<button onclick="App.toggleMultiple(${i})" class="${btnClass}"><div class="${boxClass}">${checkIcon}</div><span class="text-sm sm:text-base font-semibold text-slate-700 leading-tight">${opt}</span></button>`;
            }).join('') + `</div>`;
        }
        else if (q.type === 'matching') {
            const availableOptions = q.rightOptions.filter(opt => !Object.values(appState.selectedMatching).includes(opt.id));
            let bankHtml = `
            <div class="bg-indigo-50/50 p-3 rounded-xl border-2 border-indigo-100 min-h-[80px]">
                 <h4 class="font-bold mb-2 text-indigo-900 text-[11px] sm:text-xs uppercase flex items-center gap-1.5 opacity-80">
                     <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                     ${!isChecked ? '1. Кликни на вариант:' : 'Банк понятий'}
                 </h4>
                 <div class="flex flex-wrap gap-2">
                     ${availableOptions.map(opt => {
                         const isSelected = appState.selectedBankItem === opt.id;
                         let baseClass = "text-xs sm:text-sm font-bold px-3 py-2 rounded-lg shadow-sm transition-all select-none ";
                         if (isChecked) baseClass += "bg-slate-100 text-slate-400 border-2 border-slate-200";
                         else baseClass += isSelected ? "bg-indigo-500 text-white border-2 border-indigo-600 scale-105 shadow-md" : "bg-white border-2 border-indigo-200 text-indigo-900 cursor-pointer active:scale-95";
                         return `<div ${!isChecked ? `onclick="App.selectBankItem('${opt.id}')"` : ''} class="${baseClass}">${opt.id}) ${opt.text.replace(/^[0-9]\)\s*/, '')}</div>`;
                     }).join('')}
                     ${availableOptions.length === 0 ? '<div class="text-indigo-400 text-xs sm:text-sm font-medium w-full text-center py-2">Все варианты распределены</div>' : ''}
                 </div>
            </div>`;
            let slotsHtml = q.leftItems.map(item => {
                const selOptId = appState.selectedMatching[item.id];
                const selOpt = q.rightOptions.find(o => o.id === selOptId);
                const isCorrectMatch = selOptId === q.correct[item.id];
                let dropZoneClass = "flex-1 min-h-[2.5rem] border-2 border-dashed rounded-lg p-1 flex items-center justify-center transition-all select-none ";
                if (!isChecked) {
                    if (selOpt) dropZoneClass += "border-indigo-400 bg-indigo-50 cursor-pointer active:scale-95";
                    else if (appState.selectedBankItem) dropZoneClass += "border-indigo-400 bg-indigo-50 animate-subtle-pulse cursor-pointer";
                    else dropZoneClass += "border-slate-300 bg-slate-50";
                } else {
                    dropZoneClass += isCorrectMatch ? "border-emerald-400 bg-emerald-50" : "border-rose-400 bg-rose-50";
                }
                
                let itemTextClean = item.text.replace(/^[А-Я]\)\s*/, '');
                
                return `
                <div class="flex flex-col sm:flex-row sm:items-center gap-1.5 w-full bg-slate-50/50 p-2 rounded-xl border border-slate-100">
                    <div class="sm:w-3/5 flex items-start sm:items-center gap-2 px-1">
                        <span class="font-black text-sm sm:text-base text-slate-500 bg-slate-200 w-6 h-6 sm:w-7 sm:h-7 rounded flex items-center justify-center flex-shrink-0">${item.id}</span>
                        <span class="text-xs sm:text-sm text-slate-700 font-medium leading-tight">${itemTextClean}</span>
                    </div>
                    <div class="sm:w-2/5 ${dropZoneClass}" ${!isChecked ? `onclick="App.clickSlot('${item.id}')"` : ''}>
                        ${selOpt ? `<div class="w-full h-full bg-white border-2 border-indigo-400 text-indigo-900 font-bold px-2 py-1.5 rounded-md shadow-sm flex items-center justify-center text-center text-xs sm:text-sm">${selOpt.id}) ${selOpt.text.replace(/^[0-9]\)\s*/, '')}</div>` : `<span class="text-indigo-400 text-[11px] sm:text-xs font-semibold px-2">${appState.selectedBankItem ? 'Жми сюда' : 'Пусто'}</span>`}
                    </div>
                    ${(isChecked && !isCorrectMatch) ? `<div class="w-full sm:w-auto mt-1 sm:mt-0 text-center text-[10px] sm:text-xs text-rose-700 font-bold bg-rose-100/80 px-2.5 py-1.5 rounded-lg leading-tight">Верно: ${q.rightOptions.find(o => o.id === q.correct[item.id]).text}</div>` : ''}
                </div>`;
            }).join('');
            optionsHtml = `<div class="space-y-4">${bankHtml}<div class="space-y-2"><h4 class="font-bold text-slate-800 text-[11px] sm:text-xs uppercase opacity-80 flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>${!isChecked ? '2. Кликни куда поставить:' : 'Ответы:'}</h4>${slotsHtml}</div></div>`;
        }

        // --- УЛУЧШЕННЫЙ БЛОК ОБЪЯСНЕНИЯ ---
        let feedbackHtml = '';
        if (isChecked) {
            feedbackHtml = `
            <div id="feedback-box" class="p-4 sm:p-5 rounded-2xl mb-4 flex flex-col gap-3 border shadow-sm ${appState.isAnimating ? 'animate-fade-in-up' : ''} ${isCurrentCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}">
                <div class="flex items-center gap-3">
                    <div class="flex-shrink-0 bg-white p-1.5 rounded-full shadow-sm">${isCurrentCorrect ? icons.CheckCircle : icons.XCircle}</div>
                    <h3 class="text-base sm:text-lg font-extrabold ${isCurrentCorrect ? 'text-emerald-800' : 'text-rose-800'}">
                        ${isCurrentCorrect ? 'Абсолютно верно!' : 'Ошибка в ответе'}
                    </h3>
                </div>
                <div class="text-slate-700 text-[13px] sm:text-sm leading-relaxed font-medium bg-white/60 p-3 sm:p-4 rounded-xl border border-white/50 shadow-inner">
                    ${q.explanation}
                </div>
            </div>`;
        }

        let controlsHtml = '';
        if (!isChecked) {
            controlsHtml = `
                <button onclick="App.handleNext()" class="px-3 py-2.5 rounded-xl font-bold text-sm text-slate-400 hover:text-slate-600 active:scale-95 flex items-center gap-0.5">
                    Скип ${icons.ChevronRight}
                </button>
                <button onclick="App.handleCheck()" ${isCheckDisabled ? 'disabled' : ''} class="px-5 py-2.5 rounded-xl font-bold text-sm sm:text-base transition-all active:scale-95 ${isCheckDisabled ? 'bg-slate-200 text-slate-400 pointer-events-none' : 'bg-indigo-600 text-white shadow-md'}">
                    Ответить
                </button>
            `;
        } else {
            controlsHtml = `
                <button onclick="App.handleNext()" class="w-full py-3 sm:py-4 rounded-xl font-bold text-base sm:text-lg bg-slate-800 text-white active:scale-95 shadow-md flex items-center justify-center gap-1">
                    ${appState.currentIndex < appState.currentQuestions.length - 1 ? 'Дальше' : 'Завершить'} ${icons.ChevronRight}
                </button>
            `;
        }

        const progressPercent = ((appState.currentIndex + 1) / appState.currentQuestions.length) * 100;
        return `
        <div class="w-full p-2 sm:p-4 flex-1 flex flex-col ${appState.isAnimating ? 'animate-fade-in-up' : ''}">
            <div class="flex justify-between items-center mb-3">
                <div class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase bg-white px-2.5 py-1 rounded-md shadow-sm border border-slate-100">
                    ${q.topic === 'tax' ? 'Налоги' : 'Право'}
                </div>
                <div class="text-[10px] sm:text-xs font-extrabold text-indigo-800 bg-indigo-100 px-2.5 py-1 rounded-md">
                    ${appState.currentIndex + 1} / ${appState.currentQuestions.length}
                </div>
            </div>
            <div class="w-full bg-slate-200/80 rounded-full h-1.5 mb-4 shadow-inner">
                <div class="bg-indigo-500 h-full rounded-full transition-all duration-300 ease-out" style="width: ${progressPercent}%"></div>
            </div>
            <div class="bg-white/95 backdrop-blur-sm rounded-[1.25rem] shadow-lg border border-slate-100 p-4 sm:p-6 mb-4">
                <h2 class="text-base sm:text-lg font-bold text-slate-800 mb-4 leading-snug">${q.text}</h2>
                ${optionsHtml}
            </div>
            ${feedbackHtml}
            <div class="flex justify-between items-center w-full mt-auto mb-2 gap-2">
                ${controlsHtml}
            </div>
            <div class="mt-2 text-center">
                <button onclick="App.goHome()" class="text-slate-400 text-xs font-bold uppercase py-2">В меню</button>
            </div>
        </div>`;
    }
};

document.addEventListener('DOMContentLoaded', () => { App.init(); });
</script>
</body>
</html>
